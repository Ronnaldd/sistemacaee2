<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAEE - Acesso ao Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --caee-blue: #0000ff; --caee-yellow: #ffcc00; --bg-main: #f4f6fc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--caee-blue); }
        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; color: #1e1b4b; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
        label { display: block; text-align: left; font-weight: 600; color: #475569; margin-top: 1rem; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; margin-top: 5px; font-size: 0.95rem; background: #f8fafc; }
        .btn-login { margin-top: 2rem; width: 100%; padding: 14px; background: var(--caee-blue); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Painel CAEE</h2>
        <p>Insira suas credenciais de acesso</p>
        <form id="form-login">
            <label>Usuário:</label>
            <input type="text" id="user" placeholder="Nome de usuário" required>
            <label>Senha:</label>
            <input type="password" id="pass" placeholder="Sua senha" required>
            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>
    </div>
    <script>
        document.getElementById('form-login').onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
                sessionStorage.setItem('usuarioLogado', 'true');
                // ALTERADO PASSO 3: Redireciona para painel.html em vez de index.html
                window.location.href = 'painel.html';
            } else {
                alert('Usuário ou senha inválidos!');
            }
        };
    </script>
</body>
</html>
