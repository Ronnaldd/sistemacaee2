<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAEE - Gerenciar Equipe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --caee-blue: #0000ff; --caee-yellow: #ffcc00; --caee-red: #ff0000; --caee-green: #008000; --bg-main: #f4f6fc; --sidebar-w: 280px; --card-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-main); display: flex; }
        .sidebar { width: var(--sidebar-w); background: var(--caee-blue); color: white; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .sidebar h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 2.5rem; color: var(--caee-yellow); text-shadow: 2px 2px 0px #000; }
        .nav-link { display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.8); padding: 1rem 1.25rem; text-decoration: none; border-radius: 16px; margin-bottom: 0.75rem; font-weight: 600; }
        .nav-link.active { background: var(--caee-yellow); color: #000; }
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 3rem; }
        .card { background: white; border-radius: 24px; padding: 2.5rem; box-shadow: var(--card-shadow); border-top: 6px solid var(--caee-blue); margin-bottom: 2rem; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 14px; margin-top: 5px; background: #f8fafc; }
        label.secao-label { display: block; margin-top: 15px; font-weight: 600; color: #475569; }
        .dias-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 8px; }
        .dia-option { background: #f8fafc; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; }
        .dia-title { font-weight: 600; font-size: 0.9rem; color: #334155; margin-bottom: 6px; display: block; }
        .turnos-flex { display: flex; gap: 10px; }
        .turno-check { display: flex; align-items: center; gap: 4px; font-size: 0.85rem; cursor: pointer; }
        .btn-submit { padding: 14px; background: var(--caee-blue); color: white; border: none; border-radius: 50px; font-weight: 700; width: 100%; margin-top: 15px; cursor: pointer; }
        .btn-print { background: var(--caee-green); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 12px 16px; color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 16px; background: #f8fafc; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
        .badge-cargo { background: #e0e7ff; color: var(--caee-blue); padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge-escala { background: #f1f5f9; color: #334155; padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; font-weight: 500; display: inline-block; margin: 2px; border: 1px solid #cbd5e1; }
        .crud-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; margin-right: 12px; }
        @media print {
            @page { size: landscape; margin: 1cm; }
            body { background: white; color: black; }
            .sidebar, .main-content > *:not(.print-section), .card, .btn-print, select, th:last-child, td:last-child { display: none !important; }
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            .print-section { display: block !important; }
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid black; padding: 12px; }
        }
        .print-section { display: none; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2><i class="fas fa-puzzle-piece"></i> Gestão CAEE</h2>
        <ul class="nav-links">
            <li><a href="painel.html" class="nav-link"><i class="fas fa-chart-pie"></i> Painel Geral</a></li>
            <li><a href="cadastro-crianca.html" class="nav-link"><i class="fas fa-child"></i> Gerenciar Crianças</a></li>
            <li><a href="cadastro-profissional.html" class="nav-link active"><i class="fas fa-user-doctor"></i> Gerenciar Equipe</a></li>
            <li><a href="calendario-eventos.html" class="nav-link"><i class="fas fa-calendar-days"></i> Eventos e Ações</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="card">
            <h2 id="form-title"><i class="fas fa-user-plus" style="color:var(--caee-blue)"></i> Registrar Técnico</h2>
            <form id="form-profissional">
                <input type="hidden" id="edit-id">
                <div class="input-grid">
                    <input type="text" id="nome" placeholder="Nome do Especialista" required>
                    <input type="text" id="cargo" placeholder="Cargo ou Especialidade" required>
                </div>
                <label class="secao-label">Escala Semanal:</label>
                <div class="dias-grid">
                    <div class="dia-option"><span class="dia-title">Segunda</span><div class="turnos-flex"><label class="turno-check"><input type="checkbox" name="seg" value="M"> M</label><label class="turno-check"><input type="checkbox" name="seg" value="T"> T</label></div></div>
                    <div class="dia-option"><span class="dia-title">Terça</span><div class="turnos-flex"><label class="turno-check"><input type="checkbox" name="ter" value="M"> M</label><label class="turno-check"><input type="checkbox" name="ter" value="T"> T</label></div></div>
                    <div class="dia-option"><span class="dia-title">Quarta</span><div class="turnos-flex"><label class="turno-check"><input type="checkbox" name="qua" value="M"> M</label><label class="turno-check"><input type="checkbox" name="qua" value="T"> T</label></div></div>
                    <div class="dia-option"><span class="dia-title">Quinta</span><div class="turnos-flex"><label class="turno-check"><input type="checkbox" name="qui" value="M"> M</label><label class="turno-check"><input type="checkbox" name="qui" value="T"> T</label></div></div>
                    <div class="dia-option"><span class="dia-title">Sexta</span><div class="turnos-flex"><label class="turno-check"><input type="checkbox" name="sex" value="M"> M</label><label class="turno-check"><input type="checkbox" name="sex" value="T"> T</label></div></div>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit">Salvar Registro</button>
            </form>
        </div>

        <div class="card filter-card">
            <div class="header-box">
                <h2><i class="fas fa-users" style="color: #d97706"></i> Equipe Cadastrada</h2>
                <button class="btn-print" onclick="imprimirRelatorioEquipe()"><i class="fas fa-print"></i> Imprimir Escala</button>
            </div>
            <table>
                <thead><tr><th>Profissional</th><th>Especialidade</th><th>Dias/Turnos</th><th style="text-align:right">Controle</th></tr></thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
        <div id="zona-impressao-equipe" class="print-section"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://entcirynxefxdncivhmy.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVudGNpcnlueGVmeGRuY2l2aG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjU0NDIsImV4cCI6MjA5ODg0MTQ0Mn0.VT0hR_G6_jnXlO28UcdFnwfsM97zyKv4NKznIfEWH2Y');
        const dias = ['seg', 'ter', 'qua', 'qui', 'sex'];
        const mapeamentoDias = { seg: 'Seg', ter: 'Ter', qua: 'Qua', qui: 'Qui', sex: 'Sex' };
        let listaLocalProfissionais = [];

        async function renderTable() {
            const { data: profissionais } = await _supabase.from('profissionais').select('*').order('nome');
            listaLocalProfissionais = profissionais || [];
            const tbody = document.getElementById('corpo-tabela');
            tbody.innerHTML = listaLocalProfissionais.length === 0 ? "<tr><td colspan='4'>Nenhum profissional cadastrado.</td></tr>" : "";

            listaLocalProfissionais.forEach(p => {
                let txtEscala = "";
                let esc = typeof p.escala === 'string' ? JSON.parse(p.escala || '{}') : p.escala || {};
                for (let d in esc) { txtEscala += `<span class="badge-escala"><strong>${mapeamentoDias[d] || d}:</strong> ${esc[d]}</span> `; }

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${p.nome}</strong></td><td><span class="badge-cargo">${p.cargo}</span></td><td><div>${txtEscala || 'Não definida'}</div></td>
                        <td style="text-align:right">
                            <button class="crud-btn" style="color:blue" onclick="prepararEdicao(${p.id})"><i class="fas fa-edit"></i></button>
                            <button class="crud-btn" style="color:red" onclick="remover(${p.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        document.getElementById('form-profissional').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            let objEscala = {};
            dias.forEach(d => {
                let checked = [...document.querySelectorAll(`input[name="${d}"]:checked`)].map(cb => cb.value);
                if(checked.length > 0) objEscala[d] = checked.join('/');
            });

            const payload = { nome: document.getElementById('nome').value, cargo: document.getElementById('cargo').value, escala: objEscala };

            if(!id) { await _supabase.from('profissionais').insert([payload]); }
            else { await _supabase.from('profissionais').update(payload).eq('id', id); }

            document.getElementById('form-profissional').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerHTML = `<i class="fas fa-user-plus" style="color:var(--caee-blue)"></i> Registrar Técnico`;
            renderTable();
        };

        window.prepararEdicao = (id) => {
            const p = listaLocalProfissionais.find(item => item.id === id);
            if (!p) return;

            document.getElementById('edit-id').value = p.id;
            document.getElementById('nome').value = p.nome;
            document.getElementById('cargo').value = p.cargo;
            
            let esc = typeof p.escala === 'string' ? JSON.parse(p.escala || '{}') : p.escala || {};
            dias.forEach(d => {
                document.querySelectorAll(`input[name="${d}"]`).forEach(cb => cb.checked = (esc[d] || '').includes(cb.value));
            });
            document.getElementById('form-title').innerHTML = `<i class="fas fa-edit" style="color:var(--caee-yellow)"></i> Editar Técnico`;
        };

        window.remover = async (id) => {
            if(confirm("Remover especialista?")) {
                await _supabase.from('profissionais').delete().eq('id', id);
                renderTable();
            }
        };

        function imprimirRelatorioEquipe() {
            let lines = listaLocalProfissionais.map(p => {
                let esc = typeof p.escala === 'string' ? JSON.parse(p.escala || '{}') : p.escala || {};
                let txt = Object.keys(esc).map(d => `${mapeamentoDias[d] || d}: ${esc[d]}`).join(', ');
                return `<tr><td>${p.nome}</td><td>${p.cargo}</td><td>${txt || 'Não definida'}</td></tr>`;
            }).join('');
            document.getElementById('zona-impressao-equipe').innerHTML = `<h2>ESCALA SEMANAL DA EQUIPE</h2><table class="print-table"><thead><tr><th>Nome</th><th>Cargo</th><th>Escala</th></tr></thead><tbody>${lines}</tbody></table>`;
            window.print();
        }

        renderTable();
    </script>
</body>
</html>
